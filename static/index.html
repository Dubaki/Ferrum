<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ferrum.AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: 'Outfit', sans-serif; }
        .glass { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-left-color: #6366f1; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        details summary { list-style: none; outline: none; cursor: pointer; }
        details summary::-webkit-details-marker { display: none; }
        .upload-zone { border: 2px dashed rgba(99, 102, 241, 0.4); background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.05)); }
        .btn-primary { background: linear-gradient(92deg, #4f46e5 0%, #7c3aed 100%); }
        .btn-secondary { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-5 pb-32 min-h-screen flex flex-col">

    <header class="flex justify-between items-center mb-8 mt-4">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Ferrum</h1>
            <p class="text-xs text-blue-200 opacity-70 tracking-wider uppercase font-semibold">Система Расчета</p>
        </div>
        <div class="glass w-10 h-10 rounded-full flex items-center justify-center text-lg">💎</div>
    </header>

    <div id="uploadZone" class="upload-zone rounded-3xl h-60 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden active:scale-95 transition-all">
        <div class="w-16 h-16 rounded-2xl bg-indigo-500/20 flex items-center justify-center mb-4 border border-indigo-500/30">
            <svg class="w-8 h-8 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        </div>
        <h3 class="text-lg font-bold text-white">Загрузить PDF</h3>
        <input type="file" id="fileInput" accept=".pdf" class="hidden">
    </div>

    <div id="loader" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/80 backdrop-blur-xl">
        <div class="loader mb-4"></div>
        <p class="text-lg font-medium text-white">Расчёт металла...</p>
    </div>

    <div id="results" class="hidden space-y-4 mt-6"></div>

    <div id="actionsWrapper" class="hidden fixed bottom-6 left-4 right-4 z-40 flex flex-col gap-3">
        <button onclick="downloadExcel()" class="btn-primary w-full py-3.5 rounded-xl font-bold text-white shadow-lg flex justify-center gap-2 items-center">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            Скачать Excel
        </button>
        
        <button onclick="resetApp()" class="btn-secondary w-full py-3.5 rounded-xl font-semibold text-slate-300 flex justify-center gap-2">
            ↺ Загрузить другой файл
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = ""; 

        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');
        const actionsWrapper = document.getElementById('actionsWrapper');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loader.classList.remove('hidden');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_URL}/api/calculate`, { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.error) throw new Error(data.error);
                
                renderResults(data);
                uploadZone.classList.add('hidden');
                actionsWrapper.classList.remove('hidden');

            } catch (err) {
                tg.showAlert(`Ошибка: ${err.message}`);
                resetApp(); // Сброс при ошибке
            } finally {
                loader.classList.add('hidden');
                fileInput.value = '';
            }
        });

        function resetApp() {
            resultsDiv.innerHTML = '';
            resultsDiv.classList.add('hidden');
            actionsWrapper.classList.add('hidden');
            uploadZone.classList.remove('hidden');
        }

        function downloadExcel() { window.location.href = `${API_URL}/api/export`; }

        function renderResults(data) {
            resultsDiv.classList.remove('hidden');
            let html = '';
            
            const createGroup = (title, items, icon, color) => {
                if (!items || items.length === 0) return '';
                let cards = items.map(i => `
                    <div class="bg-white/5 rounded-xl p-3 mb-2 border-l-2 border-${color}-500">
                        <div class="flex justify-between items-start mb-1"><h4 class="font-medium text-sm text-slate-200">${i.name}</h4><span class="text-[10px] bg-white/10 px-2 py-0.5 rounded text-slate-400">${i.summary}</span></div>
                        <div class="text-[11px] text-slate-500 font-mono">${i.details}</div>
                    </div>`).join('');
                return `
                <details class="glass rounded-xl mb-3 group open:bg-slate-800/80 transition-colors">
                    <summary class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-3"><span class="text-xl">${icon}</span> <span class="font-bold text-slate-200">${title}</span></div>
                        <span class="text-xs bg-slate-700 px-2 py-1 rounded-full text-slate-300">${items.length}</span>
                    </summary>
                    <div class="px-3 pb-3 pt-0 border-t border-white/5 mt-2 pt-3">${cards}</div>
                </details>`;
            };

            html += createGroup('Листы', data.sheets, '🟦', 'blue');
            html += createGroup('Труба Квадрат', data.square_tubes, '🔳', 'indigo');
            html += createGroup('Труба Прямоуг.', data.rect_tubes, '▭', 'purple');
            html += createGroup('Труба Э/С', data.es_pipes, '⚪', 'emerald');
            html += createGroup('Уголок', data.angles, '📐', 'amber');
            html += createGroup('Круг / Пруток', data.rounds, '⚫', 'red');

            if (!html) {
                html = `
                <div class="glass p-8 rounded-2xl text-center border-dashed border-2 border-slate-600">
                    <p class="text-3xl mb-2">🤷‍♂️</p>
                    <p class="text-slate-300 font-bold">Данные не найдены</p>
                    <p class="text-slate-500 text-sm mt-1">Попробуйте другой файл или проверьте формат</p>
                </div>`;
            }
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
