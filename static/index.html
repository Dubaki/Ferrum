<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrum Calc</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #1e1e1e); color: var(--tg-theme-text-color, #fff); }
        .card { background-color: var(--tg-theme-secondary-bg-color, #2d2d2d); }
    </style>
</head>
<body class="p-4 font-sans text-sm">

    <div class="text-center mb-6">
        <h1 class="text-xl font-bold">🏗 Калькулятор Металла</h1>
        <p class="text-xs opacity-70">Загрузите PDF спецификацию</p>
    </div>

    <div id="uploadZone" class="card p-8 rounded-xl border-2 border-dashed border-gray-600 flex flex-col items-center justify-center cursor-pointer">
        <span class="font-bold text-blue-400">ВЫБРАТЬ ФАЙЛ</span>
        <input type="file" id="fileInput" accept=".pdf" class="hidden">
    </div>

    <div id="loader" class="hidden text-center mt-8 text-yellow-500 font-bold">⏳ Считаем...</div>

    <div id="results" class="hidden mt-6 space-y-6"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = ""; // Текущий сервер

        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const resultsDiv = document.getElementById('results');
        const loader = document.getElementById('loader');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            if (!e.target.files[0]) return;
            
            uploadZone.classList.add('hidden');
            loader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', e.target.files[0]);

            try {
                const res = await fetch(`${API_URL}/api/calculate`, { method: 'POST', body: formData });
                const data = await res.json();
                renderResults(data);
            } catch (err) {
                alert("Ошибка: " + err.message);
                uploadZone.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        });

        function renderResults(data) {
            resultsDiv.classList.remove('hidden');
            let html = '';

            // Функция для отрисовки секции
            const renderSection = (title, items, icon) => {
                if (!items || items.length === 0) return '';
                let sectionHtml = `<h2 class="text-lg font-bold border-b border-gray-600 pb-1 mb-2">${icon} ${title}</h2>`;
                items.forEach(item => {
                    sectionHtml += `
                    <div class="card p-3 rounded-lg mb-2 shadow">
                        <div class="flex justify-between">
                            <span class="font-bold text-blue-300">${item.name}</span>
                            <span class="bg-gray-700 px-2 rounded text-xs py-1">${item.summary}</span>
                        </div>
                        <p class="text-xs mt-1 opacity-70">${item.details}</p>
                    </div>`;
                });
                return sectionHtml;
            };

            html += renderSection('Листовой прокат', data.sheets, '🟦');
            html += renderSection('Труба Квадратная', data.square_tubes, '🔲');
            html += renderSection('Труба Прямоугольная', data.rect_tubes, '▭');
            html += renderSection('Труба Э/С (Круглая)', data.es_pipes, '🟣');
            html += renderSection('Уголки', data.angles, '📐');
            html += renderSection('Круг (Пруток)', data.rounds, '⚫');

            if (html === '') html = '<div class="text-center opacity-50">Ничего не найдено в файле</div>';
            
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
