<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ferrum.AI</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;500;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .ambient-light { position: fixed; inset: 0; z-index: -1; background: radial-gradient(circle at 10% 20%, rgba(79,70,229,0.3), transparent 40%), radial-gradient(circle at 90% 80%, rgba(236,72,153,0.2), transparent 40%); filter: blur(60px); }
        .glass { background: rgba(255,255,255,0.07); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        details summary { list-style: none; outline: none; cursor: pointer; }
        details summary::-webkit-details-marker { display: none; }
        .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-left-color: #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .btn-glass { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); background-image: linear-gradient(135deg, rgba(59,130,246,0.4), rgba(147,51,234,0.4)); }
    </style>
</head>
<body class="p-5 pb-32 min-h-screen">
    <div class="ambient-light"></div>

    <header class="flex justify-between items-center mb-8 mt-4">
        <div>
            <h1 class="text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-white to-slate-400">Ferrum</h1>
            <p class="text-xs text-blue-200 opacity-70 tracking-wider uppercase font-semibold">Система Расчета</p>
        </div>
        <div class="glass w-10 h-10 rounded-full flex items-center justify-center text-lg">💎</div>
    </header>

    <div id="uploadZone" class="glass rounded-3xl h-60 flex flex-col items-center justify-center cursor-pointer relative overflow-hidden active:scale-95 transition-all">
        <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500/20 to-purple-500/20 flex items-center justify-center mb-4 border border-white/10 shadow-[0_0_15px_rgba(59,130,246,0.2)]">
            <svg class="w-8 h-8 text-blue-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        </div>
        <h3 class="text-lg font-semibold text-white">Загрузить файл</h3>
        <p class="text-sm text-slate-400 mt-1">PDF Спецификация</p>
        <input type="file" id="fileInput" accept=".pdf" class="hidden">
    </div>

    <div id="loader" class="hidden fixed inset-0 z-50 flex flex-col items-center justify-center bg-black/70 backdrop-blur-xl">
        <div class="spinner mb-4"></div>
        <p class="text-lg font-medium text-white">Расчёт металла...</p>
        <p class="text-xs text-white/50 mt-1">Формируем карту раскроя</p>
    </div>

    <div id="results" class="hidden space-y-4 mt-6"></div>

    <div id="exportWrapper" class="hidden fixed bottom-8 left-6 right-6 z-40">
        <button onclick="downloadExcel()" class="btn-glass w-full py-4 rounded-2xl font-bold text-white text-lg flex items-center justify-center gap-3">
            <span>📥</span> Скачать Excel
        </button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        const API_URL = ""; 

        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');
        const exportWrapper = document.getElementById('exportWrapper');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            loader.classList.remove('hidden');
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch(`${API_URL}/api/calculate`, { method: 'POST', body: formData });
                const data = await res.json();
                renderResults(data);
                uploadZone.classList.add('hidden');
                exportWrapper.classList.remove('hidden');
            } catch (err) {
                tg.showAlert(`Ошибка: ${err.message}`);
            } finally {
                loader.classList.add('hidden');
                fileInput.value = '';
            }
        });

        function downloadExcel() { window.location.href = `${API_URL}/api/export`; }

        function renderResults(data) {
            resultsDiv.classList.remove('hidden');
            let html = '';
            
            const createGroup = (title, items, icon, color) => {
                if (!items || items.length === 0) return '';
                let cards = items.map(i => `
                    <div class="bg-white/5 rounded-xl p-3 mb-2 border border-white/5">
                        <div class="flex justify-between items-start mb-1"><h4 class="font-medium text-sm">${i.name}</h4><span class="text-[10px] bg-white/10 px-2 py-0.5 rounded-full">${i.summary}</span></div>
                        <div class="text-[11px] text-slate-400 font-mono">${i.details}</div>
                    </div>`).join('');
                return `
                <details class="glass rounded-2xl mb-4 group open:bg-white/5 transition-colors">
                    <summary class="p-4 flex items-center justify-between">
                        <div class="flex items-center gap-3"><div class="w-8 h-8 rounded-full flex items-center justify-center bg-${color}-500/20 text-${color}-300">${icon}</div><span class="font-semibold">${title}</span></div>
                        <span class="text-xs bg-white/10 px-2 py-1 rounded text-slate-300">${items.length}</span>
                    </summary>
                    <div class="px-3 pb-3 pt-0">${cards}</div>
                </details>`;
            };

            html += createGroup('Листы', data.sheets, '🟦', 'blue');
            html += createGroup('Труба Квадрат', data.square_tubes, '🔳', 'indigo');
            html += createGroup('Труба Прямоуг.', data.rect_tubes, '▭', 'purple');
            html += createGroup('Труба Э/С', data.es_pipes, '⚪', 'emerald');
            html += createGroup('Уголок', data.angles, '📐', 'amber');
            html += createGroup('Круг / Пруток', data.rounds, '⚫', 'red');

            if (!html) html = '<div class="glass p-8 rounded-2xl text-center"><p class="text-xl">👻</p><p class="text-white/60 text-sm mt-2">Данные не найдены</p></div>';
            resultsDiv.innerHTML = html;
        }
    </script>
</body>
</html>
