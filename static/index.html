<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferrum Calculator</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: var(--tg-theme-bg-color, #1c1c1e); color: var(--tg-theme-text-color, #ffffff); }
        .card { background-color: var(--tg-theme-secondary-bg-color, #2c2c2e); }
        .btn-primary { background-color: var(--tg-theme-button-color, #3390ec); color: var(--tg-theme-button-text-color, #ffffff); }
        .loader { border-top-color: #3390ec; -webkit-animation: spinner 1.5s linear infinite; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 font-sans">

    <div class="text-center mb-6">
        <h1 class="text-2xl font-bold">🏗 Ferrum Master</h1>
        <p class="text-sm opacity-70">Загрузите спецификацию (PDF)</p>
    </div>

    <div id="uploadZone" class="card p-8 rounded-xl border-2 border-dashed border-gray-600 flex flex-col items-center justify-center cursor-pointer transition active:scale-95">
        <svg class="w-12 h-12 mb-3 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
        <span class="font-medium">Нажми для загрузки</span>
        <input type="file" id="fileInput" accept=".pdf" class="hidden">
    </div>

    <div id="loader" class="hidden flex-col items-center mt-8">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="animate-pulse">Считаем металл...</p>
    </div>

    <div id="results" class="hidden mt-6 space-y-4">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand(); // На весь экран

        // ВАЖНО: Вставьте сюда URL вашего сервера Render (без / в конце)
        // Пример: https://ferrum-pmxx.onrender.com
        const API_URL = ""; 

        const fileInput = document.getElementById('fileInput');
        const uploadZone = document.getElementById('uploadZone');
        const loader = document.getElementById('loader');
        const resultsDiv = document.getElementById('results');

        uploadZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // UI: Показываем лоадер
            uploadZone.classList.add('hidden');
            loader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_URL}/api/calculate`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Ошибка сервера');
                const data = await response.json();
                renderResults(data);

            } catch (error) {
                alert("Ошибка: " + error.message);
                uploadZone.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        });

        function renderResults(data) {
            resultsDiv.classList.remove('hidden');
            let html = '';

            // Листы
            if (data.sheets.length > 0) {
                html += `<h2 class="text-xl font-bold mb-2">🟦 Листовой прокат</h2>`;
                data.sheets.forEach(item => {
                    html += `
                    <div class="card p-4 rounded-lg mb-3 shadow-lg">
                        <div class="flex justify-between items-center">
                            <h3 class="font-bold text-lg">${item.name}</h3>
                            <span class="bg-blue-600 px-2 py-1 rounded text-xs">${item.summary}</span>
                        </div>
                        <p class="text-sm mt-2 opacity-80">${item.details}</p>
                    </div>`;
                });
            }

            // Профили
            if (data.profiles.length > 0) {
                html += `<h2 class="text-xl font-bold mt-6 mb-2">🟧 Профильный прокат</h2>`;
                data.profiles.forEach(item => {
                    // Визуализация заполнения (прогресс бар)
                    let widthPercent = (12000 - (item.warehouse_rem || 0)*1000) / 120; // Примерно
                    
                    html += `
                    <div class="card p-4 rounded-lg mb-3 shadow-lg">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 class="font-bold text-lg text-orange-400">${item.name}</h3>
                                <p class="text-xs mt-1">${item.summary}</p>
                            </div>
                        </div>
                        
                        <div class="mt-3 bg-gray-700 h-2 rounded-full overflow-hidden">
                            <div class="bg-orange-500 h-full" style="width: 80%"></div>
                        </div>
                        <div class="flex justify-between text-xs mt-1 opacity-60">
                            <span>Полезное</span>
                            <span>Отход</span>
                        </div>

                        <div class="mt-3 p-2 bg-black bg-opacity-20 rounded text-xs font-mono">
                            ${item.details}
                        </div>
                    </div>`;
                });
            }
            
            resultsDiv.innerHTML = html;
            tg.MainButton.setText("Скачать отчет (Excel)");
            tg.MainButton.show();
        }
    </script>
</body>
</html>
